<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SPEC_ID}} — {{TITLE}}</title>
  <style>
    /* ── CSS custom properties ────────────────────────────────────── */
    :root {
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --surface-2: #f1f5f9;
      --border:    #e2e8f0;
      --border-2:  #cbd5e1;
      --text:      #1e293b;
      --text-2:    #475569;
      --text-3:    #94a3b8;
      --accent:    #3b82f6;
      --accent-bg: #eff6ff;
      --code-bg:   #f1f5f9;
      --hdr-h:     52px;
    }
    [data-theme="dark"] {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface-2: #263248;
      --border:    #334155;
      --border-2:  #475569;
      --text:      #e2e8f0;
      --text-2:    #94a3b8;
      --text-3:    #64748b;
      --accent:    #60a5fa;
      --accent-bg: #1e3a5f;
      --code-bg:   #263248;
    }

    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px; line-height: 1.65;
      color: var(--text); background: var(--bg);
      padding-top: var(--hdr-h);
      transition: background 0.2s, color 0.2s;
    }

    /* ── Sticky header ────────────────────────────────────────────── */
    #relic-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--hdr-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 1.25rem; gap: 0.75rem;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    #relic-header .h-id {
      font-family: ui-monospace, monospace; font-size: 0.72rem; font-weight: 700;
      color: var(--accent); background: var(--accent-bg);
      padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
    }
    #relic-header .h-title {
      font-size: 0.88rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    #relic-header .h-nav {
      display: flex; gap: 0.2rem; flex-shrink: 0;
    }
    #relic-header .h-link {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 3px 10px; border-radius: 5px; font-size: 0.76rem; font-weight: 500;
      color: var(--text-2); text-decoration: none;
      border: 1px solid var(--border); background: var(--surface-2);
      transition: all 0.15s; white-space: nowrap;
    }
    #relic-header .h-link:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    #relic-header .h-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 5px; padding: 3px 9px; cursor: pointer;
      font-size: 0.95rem; line-height: 1.4; color: var(--text-2);
      transition: background 0.15s; flex-shrink: 0;
    }
    #relic-header .h-toggle:hover { background: var(--surface-2); }

    /* ── Layout ───────────────────────────────────────────────────── */
    #relic-body { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

    /* ── Typography ───────────────────────────────────────────────── */
    h1 { font-size: 1.55rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    h2 {
      font-size: 1.05rem; font-weight: 600; color: var(--text);
      margin: 2rem 0 0.7rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border);
    }
    h3 { font-size: 0.92rem; font-weight: 600; color: var(--text-2); margin: 1.1rem 0 0.35rem; }
    p  { margin-bottom: 0.6rem; }
    a  { color: var(--accent); }
    code {
      font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 0.82em;
      background: var(--code-bg); padding: 0.1em 0.4em; border-radius: 3px; color: var(--text);
    }
    pre {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 1rem; border-radius: 8px; overflow-x: auto;
      font-size: 0.81rem; margin: 0.75rem 0; line-height: 1.55;
    }
    pre code { background: none; padding: 0; font-size: inherit; }
    ul, ol { padding-left: 1.5rem; margin-bottom: 0.6rem; }
    li { margin-bottom: 0.2rem; }

    /* ── Cards ────────────────────────────────────────────────────── */
    section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
    }
    section > h2:first-child { margin-top: 0; }

    /* ── Meta ─────────────────────────────────────────────────────── */
    .meta {
      display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: center;
      color: var(--text-3); font-size: 0.8rem; margin-bottom: 1.5rem;
    }

    /* ── Table ────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.865rem; }
    th {
      text-align: left; padding: 0.45rem 0.75rem;
      background: var(--surface-2); border-bottom: 2px solid var(--border);
      font-weight: 600; color: var(--text-2); white-space: nowrap;
    }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:nth-child(even) td { background: var(--surface-2); }
    tr:last-child td { border-bottom: none; }

    /* ── Utility classes ──────────────────────────────────────────── */
    .flex        { display: flex; }
    .flex-wrap   { flex-wrap: wrap; }
    .gap-2       { gap: 0.5rem; }
    .gap-4       { gap: 1rem; }
    .items-center{ align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-sm     { font-size: 0.875rem; }
    .text-xs     { font-size: 0.75rem; }
    .font-mono   { font-family: ui-monospace, monospace; }
    .text-muted  { color: var(--text-2); }
    .text-subtle { color: var(--text-3); }
    .text-red    { color: #dc2626; }
    .text-green  { color: #16a34a; }
    .text-blue   { color: var(--accent); }
    .text-amber  { color: #d97706; }
    .mt-1 { margin-top: 0.25rem; }  .mt-2 { margin-top: 0.5rem; }  .mt-4 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }.mb-2 { margin-bottom: 0.5rem; }.mb-4 { margin-bottom: 1rem; }
    .p-2  { padding: 0.5rem; }      .p-4  { padding: 1rem; }
    .rounded    { border-radius: 4px; }
    .rounded-md { border-radius: 6px; }
    .rounded-full{ border-radius: 9999px; }
    .border     { border: 1px solid var(--border); }
    .bg-surface { background: var(--surface); }
    .bg-surface-2{ background: var(--surface-2); }
    .w-full     { width: 100%; }
    .overflow-auto { overflow: auto; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  </style>
</head>
<body>

<!--
  RELIC COMPONENTS REFERENCE
  ==========================
  Stored in a <template> element below — inert, never rendered.
  The LLM reads #relic-docs before authoring any spec/fix HTML section.
  Using <template> (not an HTML comment) prevents --> sequences in examples from
  breaking the document structure.
-->
<template id="relic-docs">
RELIC COMPONENTS
================
All components are custom elements. Use them anywhere inside <body>.

RELIC-STATUS  — coloured status badge
  <relic-status value="pending">Pending</relic-status>
  <relic-status value="in-progress">In Progress</relic-status>
  <relic-status value="done">Done</relic-status>
  <relic-status value="risk">Risk</relic-status>
  <relic-status value="draft">Draft</relic-status>
  Values: pending (slate), in-progress (blue), done (green), risk (red), draft (purple)

RELIC-CHIP  — compact inline metadata tag (code/label style)
  <relic-chip>tag</relic-chip>
  <relic-chip color="blue">spec-008</relic-chip>
  <relic-chip color="green">done</relic-chip>
  Colors: default (slate), blue, green, amber, red, purple

RELIC-CALLOUT  — highlighted block
  <relic-callout type="info">Informational message</relic-callout>
  <relic-callout type="warn">Warning message</relic-callout>
  <relic-callout type="risk">Risk / error message</relic-callout>
  <relic-callout type="success">Success message</relic-callout>

RELIC-PROGRESS  — labelled numeric progress bar (colour tracks completion)
  <relic-progress value="7" max="12" label="Tasks complete"></relic-progress>

RELIC-TABLE  — structured table from JSON
  <relic-table
    headers='["Column A","Column B","Column C"]'
    rows='[["r1a","r1b","r1c"],["r2a","r2b","r2c"]]'>
  </relic-table>
  Note: cell content is rendered as HTML — wrap plain text in <code> tags if needed.

RELIC-CHART  — SVG chart
  Bar:  <relic-chart type="bar"  labels='["A","B","C"]' data='[10,20,15]' title="Title"></relic-chart>
  Pie:  <relic-chart type="pie"  labels='["X","Y","Z"]' data='[40,35,25]' title="Split"></relic-chart>
  Line: <relic-chart type="line" labels='["Jan","Feb","Mar"]' data='[5,8,6]' title="Trend"></relic-chart>

RELIC-FLOW  — flow diagram (Mermaid-style graph syntax)
  <relic-flow>
  graph TD
  A[Start] --> B{Decision?}
  B -->|yes| C[Done]
  B -->|no| D[Retry]
  D --> B
  </relic-flow>
  Directions: TD (top-down)  LR (left-right)  RL  BT
  Node shapes: [box]  {diamond}  (circle)
  Edges: A --> B   A -->|label| B   A --- B

CSS UTILITIES (add as class= on any element)
  Spacing:  mt-1/2/4  mb-1/2/4  p-2/4  gap-2/4
  Text:     text-sm  text-xs  font-mono  text-muted  text-subtle
            text-red  text-green  text-blue  text-amber
  Layout:   flex  flex-wrap  items-center  justify-between  w-full
            grid-2  grid-3
  Visual:   border  rounded  rounded-md  bg-surface  bg-surface-2  overflow-auto
  Cards:    use <section> for a white card with border, rounded corners, padding

HEADER & DARK MODE
  The sticky header contains:
    • spec ID chip (left)
    • spec title (centre-left)
    • nav links: spec.md  plan.md  tasks.md (relative paths — same directory as this file)
    • dark mode toggle (right) — persisted in localStorage
  All colours use CSS custom properties (--bg, --surface, --text, --border, --accent, etc.)
  so any custom CSS the LLM adds automatically inherits dark-mode support when it uses var(--*).

LLM AUTHORING RULES
  1. DO NOT copy Markdown text verbatim into HTML.
  2. Each section MUST synthesise content into the most visual form available:
       flow diagram instead of a bulleted list of steps
       table instead of prose describing columns of data
       progress bar instead of "3 of 5 tasks complete"
       relic-chip badges for inline metadata instead of parenthetical text
  3. If a section would look identical to the Markdown source, you are doing it wrong.
  4. Prefer relic-* components over raw HTML. Use raw HTML only for layouts (grid, flex).
  5. Use CSS custom properties (var(--text), var(--surface), etc.) for any custom styles
     so they work in both light and dark modes.
</template>

<script>
(function() {

  /* ── Dark mode ──────────────────────────────────────────────────── */
  const THEME_KEY = 'relic-theme';
  function getTheme() {
    return localStorage.getItem(THEME_KEY) ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(THEME_KEY, t);
    const btn = document.getElementById('relic-toggle');
    if (btn) btn.textContent = t === 'dark' ? '☀' : '🌙';
  }
  applyTheme(getTheme());
  document.addEventListener('DOMContentLoaded', () => {
    applyTheme(getTheme());
    document.getElementById('relic-toggle')?.addEventListener('click', () =>
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  });

  /* ── relic-status ───────────────────────────────────────────────── */
  const STATUS = {
    pending:      { bg:'#f1f5f9', border:'#cbd5e1', text:'#475569' },
    'in-progress':{ bg:'#dbeafe', border:'#93c5fd', text:'#1d4ed8' },
    done:         { bg:'#dcfce7', border:'#86efac', text:'#15803d' },
    risk:         { bg:'#fee2e2', border:'#fca5a5', text:'#b91c1c' },
    draft:        { bg:'#f3e8ff', border:'#d8b4fe', text:'#7c3aed' },
  };
  customElements.define('relic-status', class extends HTMLElement {
    connectedCallback() {
      const v = (this.getAttribute('value')||'pending').toLowerCase();
      const c = STATUS[v] || STATUS.pending;
      const label = this.textContent.trim() || v;
      this.innerHTML = `<span style="display:inline-block;padding:2px 10px;border-radius:9999px;font-size:0.72rem;font-weight:700;letter-spacing:0.03em;background:${c.bg};border:1px solid ${c.border};color:${c.text}">${label}</span>`;
    }
  });

  /* ── relic-chip ─────────────────────────────────────────────────── */
  const CHIP = {
    default:{ bg:'#f1f5f9', border:'#cbd5e1', text:'#475569' },
    blue:   { bg:'#dbeafe', border:'#93c5fd', text:'#1d4ed8' },
    green:  { bg:'#dcfce7', border:'#86efac', text:'#15803d' },
    amber:  { bg:'#fef3c7', border:'#fde68a', text:'#92400e' },
    red:    { bg:'#fee2e2', border:'#fca5a5', text:'#b91c1c' },
    purple: { bg:'#f3e8ff', border:'#d8b4fe', text:'#7c3aed' },
  };
  customElements.define('relic-chip', class extends HTMLElement {
    connectedCallback() {
      const c = CHIP[(this.getAttribute('color')||'default').toLowerCase()] || CHIP.default;
      const label = this.textContent.trim();
      this.innerHTML = `<span style="display:inline-block;padding:1px 7px;border-radius:4px;font-size:0.72rem;font-weight:600;font-family:ui-monospace,monospace;background:${c.bg};border:1px solid ${c.border};color:${c.text}">${label}</span>`;
    }
  });

  /* ── relic-callout ──────────────────────────────────────────────── */
  const CALLOUT = {
    info:   { bg:'#eff6ff', border:'#93c5fd', accent:'#3b82f6', icon:'ℹ' },
    warn:   { bg:'#fffbeb', border:'#fde68a', accent:'#f59e0b', icon:'⚠' },
    risk:   { bg:'#fff1f2', border:'#fecdd3', accent:'#f43f5e', icon:'✕' },
    success:{ bg:'#f0fdf4', border:'#86efac', accent:'#22c55e', icon:'✓' },
  };
  customElements.define('relic-callout', class extends HTMLElement {
    connectedCallback() {
      const s = CALLOUT[(this.getAttribute('type')||'info').toLowerCase()] || CALLOUT.info;
      const content = this.innerHTML;
      Object.assign(this.style, {
        display:'block', background:s.bg,
        border:`1px solid ${s.border}`, borderLeft:`4px solid ${s.accent}`,
        borderRadius:'7px', padding:'0.75rem 1rem', margin:'0.6rem 0', color:'#1e293b',
      });
      this.innerHTML = `<span style="font-weight:700;color:${s.accent};margin-right:0.5rem;font-size:0.88em">${s.icon}</span>${content}`;
    }
  });

  /* ── relic-progress ─────────────────────────────────────────────── */
  customElements.define('relic-progress', class extends HTMLElement {
    connectedCallback() {
      const val = parseInt(this.getAttribute('value')||'0',10);
      const max = parseInt(this.getAttribute('max')||'100',10);
      const label = this.getAttribute('label')||'';
      const pct = max > 0 ? Math.round((val/max)*100) : 0;
      const color = pct===100 ? '#22c55e' : pct>=60 ? '#3b82f6' : pct>=30 ? '#f59e0b' : '#ef4444';
      Object.assign(this.style, { display:'block', margin:'0.5rem 0' });
      this.innerHTML = `
        <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:#64748b;margin-bottom:5px">
          <span>${label}</span><span style="font-weight:700;color:${color}">${pct}%</span>
        </div>
        <div style="background:#e2e8f0;border-radius:9999px;height:8px;overflow:hidden">
          <div style="background:${color};height:100%;border-radius:9999px;width:${pct}%;transition:width 0.4s ease"></div>
        </div>`;
    }
  });

  /* ── relic-table ────────────────────────────────────────────────── */
  customElements.define('relic-table', class extends HTMLElement {
    connectedCallback() {
      let headers, rows;
      try { headers = JSON.parse(this.getAttribute('headers')||'[]'); } catch { headers=[]; }
      try { rows = JSON.parse(this.getAttribute('rows')||'[]'); } catch { rows=[]; }
      Object.assign(this.style, { display:'block', overflowX:'auto', margin:'0.5rem 0' });
      const t = document.createElement('table');
      if (headers.length) {
        const tr = t.createTHead().insertRow();
        headers.forEach(h => { const th=document.createElement('th'); th.textContent=h; tr.appendChild(th); });
      }
      const tbody = t.createTBody();
      rows.forEach(row => {
        const tr = tbody.insertRow();
        (Array.isArray(row)?row:[row]).forEach(cell => { tr.insertCell().innerHTML = String(cell??''); });
      });
      this.innerHTML = '';
      this.appendChild(t);
    }
  });

  /* ── relic-chart ────────────────────────────────────────────────── */
  customElements.define('relic-chart', class extends HTMLElement {
    connectedCallback() {
      const type = this.getAttribute('type')||'bar';
      const title = this.getAttribute('title')||'';
      let labels, data;
      try { labels=JSON.parse(this.getAttribute('labels')||'[]'); } catch { labels=[]; }
      try { data=JSON.parse(this.getAttribute('data')||'[]'); } catch { data=[]; }
      Object.assign(this.style, { display:'block', margin:'0.5rem 0' });

      const W=500, H=280, PAD={top:40,right:20,bottom:64,left:52};
      const CW=W-PAD.left-PAD.right, CH=H-PAD.top-PAD.bottom;
      const nums=data.map(Number);
      const maxVal=Math.max(...nums,1);
      const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];

      const mk=(tag,attrs={})=>{const el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;};
      const tx=(x,y,txt,a={})=>{const el=mk('text',{x,y,'font-size':'11','font-family':'system-ui',fill:'#64748b',...a});el.textContent=txt;return el;};
      const root=mk('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:'max-width:500px;display:block'});
      if(title) root.appendChild(tx(W/2,22,title,{'text-anchor':'middle','font-size':'14','font-weight':'600',fill:'#1e293b'}));

      if(type==='bar'){
        const barW=Math.max(8,CW/nums.length*0.55), gap=CW/nums.length;
        [0.25,0.5,0.75,1].forEach(n=>root.appendChild(mk('line',{x1:PAD.left,y1:PAD.top+CH-(n*CH),x2:PAD.left+CW,y2:PAD.top+CH-(n*CH),stroke:'#f1f5f9','stroke-width':'1'})));
        root.appendChild(mk('line',{x1:PAD.left,y1:PAD.top+CH,x2:PAD.left+CW,y2:PAD.top+CH,stroke:'#e2e8f0','stroke-width':'1'}));
        nums.forEach((v,i)=>{
          const bh=(v/maxVal)*CH, x=PAD.left+i*gap+gap/2-barW/2, y=PAD.top+CH-bh;
          root.appendChild(mk('rect',{x,y,width:barW,height:bh,fill:COLORS[i%COLORS.length],rx:'3'}));
          root.appendChild(tx(x+barW/2,PAD.top+CH+16,labels[i]||'',{'text-anchor':'middle','font-size':'10'}));
          if(v>0) root.appendChild(tx(x+barW/2,y-5,v,{'text-anchor':'middle','font-size':'10',fill:'#334155'}));
        });
      } else if(type==='line'){
        const pts=nums.map((v,i)=>[PAD.left+(i/Math.max(nums.length-1,1))*CW, PAD.top+CH-(v/maxVal)*CH]);
        root.appendChild(mk('line',{x1:PAD.left,y1:PAD.top+CH,x2:PAD.left+CW,y2:PAD.top+CH,stroke:'#e2e8f0','stroke-width':'1'}));
        if(pts.length>1){
          const areaD=`M${pts[0][0]},${PAD.top+CH} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${PAD.top+CH} Z`;
          root.appendChild(mk('path',{d:areaD,fill:COLORS[0]+'28',stroke:'none'}));
          root.appendChild(mk('path',{d:pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' '),stroke:COLORS[0],'stroke-width':'2.5',fill:'none','stroke-linejoin':'round','stroke-linecap':'round'}));
        }
        pts.forEach(([x,y],i)=>{
          root.appendChild(mk('circle',{cx:x,cy:y,r:'4',fill:'#fff',stroke:COLORS[0],'stroke-width':'2'}));
          root.appendChild(tx(x,PAD.top+CH+16,labels[i]||'',{'text-anchor':'middle','font-size':'10'}));
        });
      } else if(type==='pie'){
        const total=nums.reduce((a,b)=>a+b,0)||1;
        const cx=W/2, cy=PAD.top+CH/2, r=Math.min(CW,CH)/2-8;
        let angle=-Math.PI/2;
        nums.forEach((v,i)=>{
          const sweep=(v/total)*2*Math.PI;
          const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
          const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
          root.appendChild(mk('path',{d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2},${y2} Z`,fill:COLORS[i%COLORS.length],stroke:'#fff','stroke-width':'2'}));
          const midA=angle+sweep/2;
          root.appendChild(tx(cx+(r*0.65)*Math.cos(midA),cy+(r*0.65)*Math.sin(midA),`${Math.round((v/total)*100)}%`,{'text-anchor':'middle',fill:'#fff','font-weight':'700','font-size':'11'}));
          angle+=sweep;
        });
        nums.forEach((_,i)=>{
          const ly=PAD.top+CH+14+Math.floor(i/3)*18, lx=PAD.left+(i%3)*140;
          root.appendChild(mk('rect',{x:lx,y:ly-8,width:10,height:10,fill:COLORS[i%COLORS.length],rx:'2'}));
          root.appendChild(tx(lx+14,ly,labels[i]||'',{}));
        });
      }
      this.innerHTML=''; this.appendChild(root);
    }
  });

  /* ── relic-flow ─────────────────────────────────────────────────── */
  customElements.define('relic-flow', class extends HTMLElement {
    connectedCallback() {
      const src = this.textContent.trim();
      this.innerHTML = '';
      try { this.appendChild(renderFlow(src)); }
      catch(e) { const p=document.createElement('pre'); p.textContent=src; this.appendChild(p); }
    }
  });

  function renderFlow(src) {
    const lines = src.split('\n').map(l=>l.trim()).filter(Boolean);
    let dir = 'LR';
    const dm = lines[0]?.match(/^(?:graph|flowchart)\s+(LR|TD|RL|BT)/i);
    if (dm) dir = dm[1].toUpperCase();

    const nodes = new Map(); // id -> { label, shape }
    const edges = [];        // { from, to, label }
    const parseNode = (id, label, shape) => {
      if (!nodes.has(id)) nodes.set(id, { label: label??id, shape: shape??'box' });
      else if (label) nodes.get(id).label = label;
    };

    const edgeRe = /([A-Za-z0-9_]+)(?:\[.*?\]|\{.*?\}|\(.*?\))?\s*(-{2,}>)\s*(?:\|([^|]*)\|)?\s*([A-Za-z0-9_]+)(?:\[([^\]]*)\]|\{([^}]*)\}|\(([^)]*)\))?/;
    for (const line of lines.slice(1)) {
      const em = line.match(edgeRe);
      if (em) {
        const fromM = line.match(/^([A-Za-z0-9_]+)(?:\[([^\]]*)\]|\{([^}]*)\}|\(([^)]*)\))?/);
        const toM   = line.match(/-{2,}>\s*(?:\|[^|]*\|)?\s*([A-Za-z0-9_]+)(?:\[([^\]]*)\]|\{([^}]*)\}|\(([^)]*)\))?/);
        if (fromM && toM) {
          const [,fId,fBox,fDiam,fCirc] = fromM;
          const [,tId,tBox,tDiam,tCirc] = toM;
          parseNode(fId, fBox??fDiam??fCirc, fDiam?'diamond':fCirc?'circle':'box');
          parseNode(tId, tBox??tDiam??tCirc, tDiam?'diamond':tCirc?'circle':'box');
          const lblM = line.match(/\|([^|]*)\|/);
          edges.push({ from:fId, to:tId, label:lblM?lblM[1]:'' });
        }
      } else {
        const nm = line.match(/^([A-Za-z0-9_]+)(?:\[([^\]]*)\]|\{([^}]*)\}|\(([^)]*)\))?$/);
        if (nm) parseNode(nm[1], nm[2]??nm[3]??nm[4], nm[3]?'diamond':nm[4]?'circle':'box');
      }
    }

    const horiz = dir==='LR'||dir==='RL';
    const nodeW=120, nodeH=38, rankGap=horiz?150:90, nodeGap=horiz?72:136;
    const ranks = rankNodes(nodes, edges);
    const rankGroups = new Map();
    nodes.forEach((_,id) => { const r=ranks.get(id)??0; if(!rankGroups.has(r))rankGroups.set(r,[]); rankGroups.get(r).push(id); });
    const pos = new Map();
    let svgW=0, svgH=0;
    rankGroups.forEach((ids,rank) => {
      ids.forEach((id,i) => {
        const x=horiz?rank*rankGap+24:i*nodeGap+24, y=horiz?i*nodeGap+24:rank*rankGap+24;
        pos.set(id,{x,y});
        svgW=Math.max(svgW,x+nodeW+40); svgH=Math.max(svgH,y+nodeH+60);
      });
    });

    const mk=(tag,attrs={})=>{const el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;};
    const root=mk('svg',{width:'100%',viewBox:`0 0 ${svgW} ${svgH}`,style:'max-width:640px;display:block;overflow:visible'});
    const defs=mk('defs');
    const marker=mk('marker',{id:'farr',markerWidth:'8',markerHeight:'8',refX:'7',refY:'3',orient:'auto'});
    const ap=mk('path'); ap.setAttribute('d','M0,0 L0,6 L8,3 z'); ap.setAttribute('fill','#94a3b8');
    marker.appendChild(ap); defs.appendChild(marker); root.appendChild(defs);

    edges.forEach(({from,to,label}) => {
      const fp=pos.get(from),tp=pos.get(to); if(!fp||!tp) return;
      const x1=fp.x+nodeW/2,y1=fp.y+nodeH/2,x2=tp.x+nodeW/2,y2=tp.y+nodeH/2;
      root.appendChild(mk('line',{x1,y1,x2,y2,stroke:'#94a3b8','stroke-width':'1.5','marker-end':'url(#farr)'}));
      if(label){const lt=mk('text');lt.setAttribute('x',(x1+x2)/2);lt.setAttribute('y',(y1+y2)/2-6);lt.setAttribute('text-anchor','middle');lt.setAttribute('font-size','10');lt.setAttribute('fill','#64748b');lt.setAttribute('font-family','system-ui');lt.textContent=label;root.appendChild(lt);}
    });

    const NF={box:'#eff6ff',diamond:'#fef3c7',circle:'#f0fdf4'};
    const NS={box:'#93c5fd',diamond:'#fbbf24',circle:'#86efac'};
    nodes.forEach(({label,shape},id)=>{
      const p=pos.get(id); if(!p) return;
      const {x,y}=p,cx=x+nodeW/2,cy=y+nodeH/2;
      if(shape==='diamond'){const poly=mk('polygon');poly.setAttribute('points',`${cx},${y} ${x+nodeW-2},${cy} ${cx},${y+nodeH} ${x+2},${cy}`);poly.setAttribute('fill',NF.diamond);poly.setAttribute('stroke',NS.diamond);poly.setAttribute('stroke-width','1.5');root.appendChild(poly);}
      else if(shape==='circle'){root.appendChild(mk('ellipse',{cx,cy,rx:nodeW/2,ry:nodeH/2,fill:NF.circle,stroke:NS.circle,'stroke-width':'1.5'}));}
      else{root.appendChild(mk('rect',{x:x+2,y,width:nodeW-4,height:nodeH,rx:'6',fill:NF.box,stroke:NS.box,'stroke-width':'1.5'}));}
      const t=mk('text');t.setAttribute('x',cx);t.setAttribute('y',cy+4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','12');t.setAttribute('font-family','system-ui');t.setAttribute('fill','#1e293b');t.textContent=label.length>18?label.slice(0,16)+'…':label;root.appendChild(t);
    });
    return root;
  }

  function rankNodes(nodes, edges) {
    const inDeg=new Map([...nodes.keys()].map(id=>[id,0]));
    edges.forEach(({to})=>inDeg.set(to,(inDeg.get(to)??0)+1));
    const adj=new Map([...nodes.keys()].map(id=>[id,[]]));
    edges.forEach(({from,to})=>adj.get(from)?.push(to));
    const ranks=new Map();
    const q=[...nodes.keys()].filter(id=>(inDeg.get(id)??0)===0);
    q.forEach(id=>ranks.set(id,0));
    const vis=new Set(q);
    while(q.length){const cur=q.shift();adj.get(cur)?.forEach(next=>{if(!vis.has(next)){vis.add(next);q.push(next);}ranks.set(next,Math.max(ranks.get(next)??0,(ranks.get(cur)??0)+1));});}
    nodes.forEach((_,id)=>{if(!ranks.has(id))ranks.set(id,0);});
    return ranks;
  }

})();
</script>
