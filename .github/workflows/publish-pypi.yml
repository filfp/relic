name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  build-binaries:
    if: "!endsWith(github.ref_name, '-npm')"
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - script_target: linux-x64
            platform_tag: manylinux_2_17_x86_64
            binary: relic
            runs_on: ubuntu-latest
          - script_target: linux-arm64
            platform_tag: manylinux_2_17_aarch64
            binary: relic
            runs_on: ubuntu-latest
          - script_target: macos-x64
            platform_tag: macosx_10_9_x86_64
            binary: relic
            runs_on: macos-latest
          - script_target: macos-arm64
            platform_tag: macosx_11_0_arm64
            binary: relic
            runs_on: macos-latest
          - script_target: windows-x64
            platform_tag: win_amd64
            binary: relic.exe
            runs_on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile binary (${{ matrix.script_target }})
        run: bun run build:pypi:${{ matrix.script_target }}

      - name: Ad-hoc sign binary (macOS only)
        if: startsWith(matrix.script_target, 'macos-')
        run: |
          codesign --remove-signature packages/cli-python/relic/relic || true
          codesign --force --sign - --timestamp=none packages/cli-python/relic/relic

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_tag }}
          path: packages/cli-python/relic/${{ matrix.binary }}

  build-wheels:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform_tag: manylinux_2_17_x86_64
            binary: relic
          - platform_tag: manylinux_2_17_aarch64
            binary: relic
          - platform_tag: macosx_10_9_x86_64
            binary: relic
          - platform_tag: macosx_11_0_arm64
            binary: relic
          - platform_tag: win_amd64
            binary: relic.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download binary (${{ matrix.platform_tag }})
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.platform_tag }}
          path: packages/cli-python/relic/

      - name: Make binary executable
        if: matrix.binary != 'relic.exe'
        run: chmod +x packages/cli-python/relic/${{ matrix.binary }}

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel packages/cli-python/ --outdir dist/

      - name: Rename wheel with platform tag
        run: |
          wheel=$(ls dist/relic_cli-*.whl)
          renamed="${wheel/py3-none-any/py3-none-${{ matrix.platform_tag }}}"
          mv "$wheel" "$renamed"
          echo "Built: $renamed"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_tag }}
          path: dist/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
